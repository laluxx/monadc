<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MonadC Context Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <canvas id="graph" aria-label="Animated context category graph"></canvas>

    <header class="top-search">
      <div class="brand-pill">
        <strong>MonadC</strong>
        <span id="graph-status">loading</span>
      </div>
      <div class="finder">
        <input id="search" type="search" autocomplete="off" placeholder="Fuzzy find nodes...  ↑ / ↓">
        <div id="candidate-list" class="candidate-list"></div>
      </div>
      <button id="refresh" class="icon-button" title="Refresh graph">↻</button>
    </header>

    <aside class="left-rail">
      <section class="stat-stack" id="project-strip"></section>
      <section class="todo-panel">
        <div class="panel-head">
          <div>
            <p class="overline todo-word">TODO</p>
            <h2>Work Queue</h2>
          </div>
          <select id="todo-filter" aria-label="TODO filter">
            <option value="open">Open</option>
            <option value="all">All</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div id="todo-list" class="todo-list"></div>
      </section>
    </aside>

    <nav class="kind-dock" id="kind-filter" aria-label="Graph filters">
      <button data-kind="all" class="active">All</button>
      <button data-kind="todo">TODO</button>
      <button data-kind="done">DONE</button>
      <button data-kind="test">Tests</button>
      <button data-kind="decision">Decisions</button>
      <button data-kind="context">Context</button>
    </nav>

    <aside class="method-panel">
      <div class="panel-head">
        <div>
          <p class="overline">Hoogle</p>
          <h2>Core / Prelude</h2>
        </div>
      </div>
      <input id="method-search" class="method-search" type="search" autocomplete="off" placeholder="map, Int -> Int, [a] -> [a]">
      <div class="method-tabs" id="method-tabs">
        <button data-group="core" class="active">Core</button>
        <button data-group="prelude">Prelude</button>
      </div>
      <div id="method-list" class="method-list"></div>
    </aside>

    <section class="info-sheet" id="inspector">
      <div class="sheet-main">
        <p class="overline" id="detail-overline">Selected Object</p>
        <h1 id="detail-title">None</h1>
        <div id="detail-kind" class="kind-chip">No selection</div>
      </div>
      <dl id="detail-list"></dl>
      <div id="neighbor-list" class="neighbor-list"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
