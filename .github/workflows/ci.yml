name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-cmake:
    name: Linux CMake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            python3 \
            pkg-config \
            llvm-dev \
            libclang-dev \
            libreadline-dev \
            libgmp-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          set -o pipefail
          cmake --build build --parallel --verbose 2>&1 | tee build/build.log

      - name: Test
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee build/ctest.log

      - name: Run compiler-facing unified suite
        run: |
          set -o pipefail
          MONAD_BINARY="$PWD/build/monad" ./build/monad test runner 2>&1 | tee build/monad-test-runner.log

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: monadc-linux-cmake
          if-no-files-found: warn
          path: |
            build/monad
            build/libmonad.a
            build/build.log
            build/ctest.log
            build/monad-test-runner.log
            build/Testing/Temporary/LastTest.log

  windows-msys2-cmake:
    name: Windows MSYS2 UCRT64 CMake
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            pkgconf:p
            python:p
            llvm:p
            clang:p
            readline:p
            gmp:p

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: |
          set -o pipefail
          cmake --build build --parallel --verbose 2>&1 | tee build/build.log

      - name: Test monad help
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^monad_help$' 2>&1 | tee build/ctest-monad-help.log

      - name: Test Windows portability contract
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^windows_portability_contract$' 2>&1 | tee build/ctest-windows-portability.log

      - name: Test CMake build contract
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^cmake_build_contract$' 2>&1 | tee build/ctest-cmake-build.log

      - name: Test checkout local binary env path
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_(relative_monad_binary_env_resolves_from_checkout_root|windows_drive_monad_binary_env_is_already_absolute)$' 2>&1 | tee build/ctest-checkout-local-binary-env.log

      - name: Test checkout local executable suffix
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_generated_executable_prefers_windows_suffix_when_present$' 2>&1 | tee build/ctest-checkout-local-exe-suffix.log

      - name: Test checkout local source contracts
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_compiler_discovers_checkout_core_and_runtime_archive$' 2>&1 | tee build/ctest-checkout-local-source-contracts.log

      - name: Test checkout local buildsystem contract
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_legacy_buildsystem_links_runtime_archive_not_object_file$' 2>&1 | tee build/ctest-checkout-local-buildsystem.log

      - name: Test checkout local repl contract
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_repl_module_import_link_uses_runtime_archive_resolver$' 2>&1 | tee build/ctest-checkout-local-repl.log

      - name: Test checkout local package smoke
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_package_build_finds_checkout_core_from_project_directory$' 2>&1 | tee build/ctest-checkout-local-package-smoke.log

      - name: Test checkout local compiler smoke
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^checkout_local_paths\.test_checkout_compiler_can_compile_program_without_install_env$' 2>&1 | tee build/ctest-checkout-local-compiler-smoke.log

      - name: Run compiler-facing unified suite
        run: |
          set -o pipefail
          MONAD_BINARY="$PWD/build/monad.exe" ./build/monad.exe test runner 2>&1 | tee build/monad-test-runner.log

      - name: Smoke test compiler binary
        run: ./build/monad.exe --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: monadc-windows-msys2-ucrt64-cmake
          if-no-files-found: warn
          path: |
            build/monad.exe
            build/libmonad.a
            build/build.log
            build/ctest-*.log
            build/monad-test-runner.log
            build/Testing/Temporary/LastTest.log
